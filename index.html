<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memorama</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f4f4f4;
}

h1{
    color:#333;
}

#tablero{
    width:440px;
    margin:20px auto;
    display:grid;
    grid-template-columns:repeat(4, 100px);
    gap:10px;
}

.carta{
    width:100px;
    height:100px;
    background:#3498db;
    color:white;
    font-size:40px;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    border-radius:10px;
}

.volteada{
    background:white;
    color:black;
    border:2px solid #3498db;
}
</style>
</head>
<body>

<h1>🧠 Memorama</h1>
<p>Encuentra todas las parejas.</p>

<div id="tablero"></div>

<script>
const emojis = ["🐶","🐱","🐭","🐰","🐶","🐱","🐭","🐰",
                "🦊","🐼","🐸","🐵","🦊","🐼","🐸","🐵"];

emojis.sort(() => Math.random() - 0.5);

const tablero = document.getElementById("tablero");

let primera = null;
let segunda = null;
let bloqueo = false;

emojis.forEach((emoji, indice) => {
    const carta = document.createElement("div");
    carta.classList.add("carta");
    carta.dataset.valor = emoji;
    carta.dataset.indice = indice;
    carta.textContent = "?";

    carta.addEventListener("click", () => {

        if(bloqueo || carta.classList.contains("volteada")) return;

        carta.textContent = emoji;
        carta.classList.add("volteada");

        if(!primera){
            primera = carta;
        }else{
            segunda = carta;
            bloqueo = true;

            if(primera.dataset.valor === segunda.dataset.valor){
                primera = null;
                segunda = null;
                bloqueo = false;

                if(document.querySelectorAll(".volteada").length === 16){
                    setTimeout(() => {
                        alert("🎉 ¡Ganaste el memorama!");
                    }, 300);
                }

            }else{
                setTimeout(() => {
                    primera.textContent = "?";
                    segunda.textContent = "?";

                    primera.classList.remove("volteada");
                    segunda.classList.remove("volteada");

                    primera = null;
                    segunda = null;
                    bloqueo = false;
                }, 1000);
            }
        }
    });

    tablero.appendChild(carta);
});
</script>

</body>
</html>
